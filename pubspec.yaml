name: workpanda
description: A student-only micro job marketplace platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  provider: ^6.1.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  font_awesome_flutter: ^11.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "image.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
